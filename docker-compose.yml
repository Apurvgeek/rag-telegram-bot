version: "3.9"

services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro
      - rag_data:/app/data
    environment:
      DB_PATH: /app/data/rag_store.db
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  rag_data:
  ollama_models:
